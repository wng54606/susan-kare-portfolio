<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact - Susan Kare</title>

  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <link rel="stylesheet" href="https://use.typekit.net/zhr1gdw.css">
</head>

<body class="contact-page">

  <header class="menu-bar">
    <nav class="menu-container">
      <a href="index.html" class="logo argent-pixel-italic">
        Susan Kare
      </a>
      <ul class="menu argent-pixel-regular">
        <li class="menu-item"><a href="works.html">Works</a></li>
        <li class="menu-item"><a href="about.html">About</a></li>
        <li class="menu-item"><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="contact-desktop argent-pixel-regular">

    <div class="mac-window contact-window">
      <div class="title-bar">
        <span class="box"></span>
        <span class="title">email me!</span>
      </div>

      <div class="window-content contact-content">

        <div class="contact-header">
          <img src="mail.png" alt="mail icon">
        </div>

        <form class="contact-form">

          <label>Name</label>
          <input type="text" placeholder="Your name">

          <label>Email</label>
          <input type="email" placeholder="your@email.com">

          <label>Message</label>
          <textarea rows="5" placeholder="Write your message..."></textarea>

          <button type="button">Send</button>

        </form>

      </div>
    </div>

  </main>

</body>
</html>
